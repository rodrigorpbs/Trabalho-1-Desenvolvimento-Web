<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Cadastro de Aluno</title>
</head>

<body>

<h1>Cadastro de Aluno</h1>

<form>

<!-- Nome -->
<div>
<label for="nome">Nome completo</label>
<input
type="text"
id="nome"
name="nome"
required>
</div>

<br>

<!-- Email -->
<div>
<label for="email">E-mail</label>
<input
type="email"
id="email"
name="email"
required>
</div>

<br>

<!-- CPF -->
<div>
<label for="cpf">CPF</label>
<input
type="text"
id="cpf"
name="cpf"
inputmode="numeric"
pattern="[0-9]{11}"
aria-describedby="cpf-dica"
required>

<small id="cpf-dica">
Digite apenas os 11 números do CPF.
</small>
</div>

<br>

<!-- Data de nascimento -->
<div>
<label for="nascimento">Data de nascimento</label>
<input
type="date"
id="nascimento"
name="nascimento"
required>
</div>

<br>

<!-- Curso -->
<div>
<label for="curso">Curso</label>

<select id="curso" name="curso" required>

<option value="">Selecione um curso</option>
<option value="administracao">Administração</option>
<option value="economia">Economia</option>
<option value="eng_software">Engenharia de Software</option>
<option value="eng_computacao">Engenharia da Computação</option>
<option value="ciencia_dados">Ciência de Dados</option>
<option value="direito">Direito</option>
<option value="arquitetura">Arquitetura</option>
<option value="relacoes_internacionais">Relações Internacionais</option>

</select>

</div>

<br>

<!-- Turno -->
<fieldset>

<legend>Turno</legend>

<div>
<input type="radio" id="manha" name="turno" value="manha" required>
<label for="manha">Manhã</label>
</div>

<div>
<input type="radio" id="tarde" name="turno" value="tarde">
<label for="tarde">Tarde</label>
</div>

<div>
<input type="radio" id="noite" name="turno" value="noite">
<label for="noite">Noite</label>
</div>

</fieldset>

<br>

<!-- Termos -->
<div>
<input type="checkbox" id="termos" name="termos" required>
<label for="termos">Aceito os termos de uso</label>
</div>

<br>

<!-- Botões -->
<div>

<button type="submit">
Enviar
</button>

<button type="reset">
Limpar
</button>

</div>

</form>

</body>
</html>
